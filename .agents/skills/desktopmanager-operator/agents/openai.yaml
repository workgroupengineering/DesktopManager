display_name: DesktopManager Operator
short_description: Operate Windows desktop state through DesktopManager MCP and CLI with an inspect-first workflow.
default_prompt: >-
  Use DesktopManager to inspect and manage the Windows desktop. Prefer MCP first,
  inspect windows and monitors before mutating anything, prefer named layouts and
  snapshots over manual moves, and use CLI only as fallback or verification.
